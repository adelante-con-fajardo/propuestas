<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobierno Fajardo</title>
      <link rel="icon" href="icono_bg.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores extraídos de la imagen de la campaña */
            --primary: #003A8C; /* Azul oscuro */
            --secondary: #C1272D; /* Rojo */
            --accent: #F3B229; /* Amarillo/Mostaza */
            --bg-color: #F0F2F5;
            --chat-bg: #FFFFFF;
            --text-color: #263238;
            --user-bg: #E3F2FD; /* Azul muy claro para usuario */
            --bot-bg: #FFFDE7; /* Amarillo muy claro para bot */
            --shadow-color: rgba(0, 58, 140, 0.15);
        }
        body { font-family: 'Roboto', sans-serif; margin: 0; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; margin-top: 1rem; }
        .chat-container { width: 100%; max-width: 550px; height: 92vh; background: var(--chat-bg); border-radius: 20px; box-shadow: 0 12px 28px var(--shadow-color); display: flex; flex-direction: column; overflow: hidden; border: 2px solid var(--accent); }
        
        /* Estilos del Header inspirados exactamente en la imagen */
        .header { background: var(--accent); padding: 20px 15px; text-align: center; border-bottom: 6px solid var(--primary); }
        .header .slogan { color: var(--primary); font-size: 1.4rem; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .header h1 { margin: 0; font-size: 3rem; background: var(--secondary); color: var(--accent); display: inline-block; padding: 5px 20px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; line-height: 1; }
        .header .sub-slogan { margin-top: 10px; font-size: 0.95rem; font-weight: 700; color: var(--primary); }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fff; }
        
        
        .message { 
            max-width: 85%; 
            padding: 14px 18px; /* Un poco más de espacio interno para que respire */
            border-radius: 15px; 
            font-size: 1.05rem; /* Letra ligeramente más grande */
            line-height: 1.6; /* Mayor interlineado (clave para textos largos) */
            letter-spacing: 0.3px; /* Separación sutil entre letras */
            box-shadow: 0 2px 5px rgba(0,0,0,0.04); /* Sombra muy suave */
        }
        .bot-msg { 
            background-color: var(--bot-bg); 
            align-self: flex-start; 
            border-bottom-left-radius: 2px; 
            border: 1px solid #FFF59D; 
            color: #1A1A1A; /* Negro casi puro para máximo contraste y claridad */
        }
        .user-msg { 
            background-color: var(--user-bg); 
            color: var(--primary); 
            align-self: flex-end; 
            border-bottom-right-radius: 2px; 
            font-weight: 600; /* Un poco más gruesa para diferenciarla */
        }
        
        .loading { display: none; padding: 15px; text-align: center; font-size: 0.9rem; color: #666; font-weight: 500; }
        .loading-visible { display: block; }
        
        .suggestions { display: flex; gap: 8px; padding: 10px; background: #f9f9f9; overflow-x: auto; border-top: 1px solid #eee; }
        .chip { background: white; border: 2px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.3s; font-weight: 700; }
        .chip:hover { background: var(--primary); color: var(--accent); }
        
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 12px 18px; border: 2px solid #ddd; border-radius: 25px; outline: none; font-size: 1rem; transition: 0.3s; }
        .input-area input:focus { border-color: var(--primary); }
        .send-btn { background: var(--secondary); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; margin-left: 10px; cursor: pointer; transition: 0.2s; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; }
        .send-btn:hover { background: #9E1D22; transform: scale(1.05); }
        .input-area { 
            display: flex; 
            padding: 15px; 
            background: white; 
            border-top: 1px solid #eee; 
            position: relative; /* <-- AÑADE ESTO para que la flecha se posicione bien */
        }
        
        /* ================= NUEVOS ESTILOS PARA LA FLECHA ================= */
        .bouncing-arrow {
            position: absolute;
            top: -38px;
            left: 20px;
            background-color: var(--secondary); /* Rojo campaña para llamar la atención */
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            animation: bounce 1.5s infinite;
            pointer-events: none; /* Evita que estorbe si le hacen clic encima */
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 10;
        }

        /* El piquito del globo apuntando hacia abajo */
        .bouncing-arrow::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 20px;
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: var(--secondary) transparent transparent transparent;
        }

        /* Animación de rebote */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Clase para ocultar la flecha cuando escriban */
        .hide-arrow {
            opacity: 0;
            visibility: hidden;
        }

        /* ================= ESTILOS PARA LISTAS HTML EN EL CHAT ================= */
        .message ul { 
            margin: 8px 0; /* Espacio arriba y abajo de la lista */
            padding-left: 20px; /* Sangría para las viñetas */
            list-style-type: disc; /* Usar viñetas estándar (discos) */
        }
        .message li { 
            margin-bottom: 6px; /* Espacio entre cada punto de la lista */
            color: #1A1A1A; /* Mismo color de texto que el bot */
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <div class="slogan">Cambio. Serio. Seguro.</div>
            <h1>Fajardo</h1>
            <!--<div class="sub-slogan">Programa de Gobierno 2026</div>-->
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">
                Hola. He analizado el programa de gobierno de Sergio Fajardo. ¿Tienes alguna duda sobre educación, economía, seguridad o sus reformas?
            </div>
        </div>
        <div class="loading" id="loadingMsg">⏳ Analizando el documento oficial...</div>
        <div class="suggestions">
            <button class="chip" onclick="askQuick('¿Cuál es el Plan Guardián de Seguridad?')">🛡️ Seguridad (Plan Guardián)</button>
            <button class="chip" onclick="askQuick('¿Qué propone para el sistema de Salud?')">🏥 Salud</button>
            <button class="chip" onclick="askQuick('¿Cómo manejará las Finanzas Públicas y la Regla Fiscal?')">📈 Economía y Finanzas</button>
            <button class="chip" onclick="askQuick('¿Cuál es la propuesta de Transición Energética?')">⚡ Energía</button>
            <button class="chip" onclick="askQuick('¿Cómo combatirá la Corrupción?')">⚖️ Lucha Anticorrupción</button>
            <button class="chip" onclick="askQuick('¿Qué reformas propone para la Justicia?')">🏛️ Justicia</button>

            <button class="chip" onclick="askQuick('¿Qué propone para la Educación?')">🎓 Educación</button>
            <button class="chip" onclick="askQuick('¿Cómo potenciará la Ciencia, Tecnología e Innovación?')">💻 Ciencia y Tecnología</button>
            <button class="chip" onclick="askQuick('¿Cuál es el plan para el Emprendimiento?')">🚀 Emprendimiento</button>
            <button class="chip" onclick="askQuick('¿Cómo impulsará la Agricultura y el desarrollo rural?')">🚜 Agro y Campo</button>
            <button class="chip" onclick="askQuick('¿Qué dice sobre Medio Ambiente y Bioeconomía?')">🌿 Medio Ambiente</button>
            <button class="chip" onclick="askQuick('¿Cuál es el plan de Infraestructura y Transporte?')">🛣️ Infraestructura</button>
            <button class="chip" onclick="askQuick('¿Qué propone para el Turismo?')">🏝️ Turismo</button>

            <button class="chip" onclick="askQuick('¿Qué propone para la Inclusión Social?')">🤝 Inclusión Social</button>
            <button class="chip" onclick="askQuick('¿Cómo creará Empleo digno y productivo?')">💼 Empleo</button>
            <button class="chip" onclick="askQuick('¿Cuál es su propuesta de Vivienda?')">🏠 Vivienda</button>
            <button class="chip" onclick="askQuick('¿Qué propone para la Cultura y el Deporte?')">🎨 Cultura y Deporte</button>
        </div>
        <div class="input-area">
            <div class="bouncing-arrow" id="typingArrow">👇 Escribe tu pregunta aquí</div>
            
            <input type="text" id="userInput" placeholder="Pregunta algo sobre el programa..." onkeypress="handleEnter(event)" onfocus="hideArrow()">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        // Función para ocultar la flecha cuando el usuario hace clic en el input
        function hideArrow() {
            const arrow = document.getElementById("typingArrow");
            if (arrow) {
                arrow.classList.add("hide-arrow");
            }
        }
        const BACKEND_URL = "https://propuestas-rc75.onrender.com/api/chat";
        let chatHistory = [];

        function askQuick(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            // 1. Guardamos el elemento HTML de la pregunta del usuario
            const userMsgElement = addMessage(text, 'user');
            
            // Hacemos scroll suave hacia abajo para que el usuario vea su pregunta enviada
            userMsgElement.scrollIntoView({ behavior: 'smooth', block: 'end' });
            
            input.value = "";
            const loading = document.getElementById("loadingMsg");
            loading.classList.add("loading-visible");

            // Ocultar la flecha si sigue activa (código de la mejora anterior)
            hideArrow(); 

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Basado en el programa de gobierno de Fajardo: ${text}`,
                        history: chatHistory
                    })
                });

                const data = await response.json();
                
                // 2. Agregamos la respuesta del bot
                addMessage(data.reply || "No pude obtener una respuesta.", 'bot');
                
                // 3. MAGIA DEL SCROLL: Hacemos que la pantalla se alinee con la pregunta del usuario (arriba)
                setTimeout(() => {
                    userMsgElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
                
                chatHistory.push({ role: "user", parts: [{ text }] });
                chatHistory.push({ role: "model", parts: [{ text: data.reply }] });

            } catch (error) {
                addMessage("Error al conectar con el servidor de análisis.", 'bot');
            } finally {
                loading.classList.remove("loading-visible");
            }
        }

        function addMessage(text, sender) {
            const box = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = `message ${sender}-msg`;
            
            if (sender === 'bot') {
                // --- LÓGICA DE FORMATEO INTELIGENTE PARA EL BOT ---
                
                // 1. Reemplazamos negritas de Gemini (**texto**) por <b>
                let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                // 2. MAGIA DE LISTAS: Detectar y envolver bloques de viñetas (* o -)
                // Buscamos líneas que empiecen por asterisco y tengan texto después.
                // (?!ul|li) evita problemas si ya hay HTML.
                formattedText = formattedText.replace(/(\r?\n|^)[*-]\s(.*?)(\r?\n|$)/g, function(match, startNewline, itemText, endNewline) {
                    // Quitamos saltos de línea extraños y envolvemos en <li>
                    return `${startNewline}<li>${itemText.trim()}</li>${endNewline}`;
                });

                // 3. Envolvemos todos los grupos de <li> adyacentes dentro de un <ul>
                formattedText = formattedText.replace(/(<li>.*?<\/li>)+/gs, '<ul>$&</ul>');

                // 4. Reemplazamos los saltos de línea restantes por <br> (para texto normal)
                formattedText = formattedText.replace(/\r?\n/g, '<br>');

                div.innerHTML = formattedText;
                
            } else {
                // Para el usuario, formato simple
                div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            }

            box.appendChild(div);
            return div; // Devolvemos el elemento (necesario para el scroll inteligente que ya tienes)
        }

        function handleEnter(e) {
            if (e.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>
